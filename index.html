<style>
:root{
  --cream:#F8EFDC;
  --cream-soft:#FBF6EA;
  --wine:#7E2330;
  --wine-deep:#54141D;
  --basil:#3F6B4F;
  --gold:#CDA434;
  --gold-soft:#ECD8A0;
  --ink:#2F2018;
  --ink-soft:#6E5C4E;
  --ink-faint:#9C8873;
  --shadow:rgba(43,27,20,.18);
  --danger:#B3392C;

  --font-display:'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-body:'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:var(--font-body);
  color:var(--ink); background:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
button{ font-family:inherit; }
h1,h2,h3{ font-family:var(--font-display); }
button:focus-visible, a:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

#app{
  position:relative;
  width:100%; max-width:1200px;
  height:100vh; height:100dvh;
  margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--cream);
  overflow:hidden;
  box-shadow:0 0 50px rgba(0,0,0,.35);
}

/* ===================== TOP BAR ===================== */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:var(--wine); color:var(--cream);
  box-shadow:0 2px 10px var(--shadow); flex-shrink:0; z-index:5;
}
.brand{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:1.2rem; font-weight:800; }
.brand .pos-label{
  font-size:.6rem; font-weight:800; letter-spacing:2px; text-transform:uppercase;
  background:rgba(255,255,255,.16); padding:4px 10px; border-radius:20px;
}
.clock{ text-align:right; line-height:1.25; }
.clock .ctime{ font-family:var(--font-display); font-size:1.1rem; font-weight:800; }
.clock .cdate{ font-size:.7rem; font-weight:700; color:var(--gold-soft); letter-spacing:.5px; }

/* ===================== VIEWS ===================== */
.content{ flex:1; position:relative; overflow:hidden; }
.view{ position:absolute; inset:0; overflow-y:auto; padding:18px; opacity:0; visibility:hidden; pointer-events:none; transition:opacity .18s ease; }
.view.active{ opacity:1; visibility:visible; pointer-events:auto; }

.view-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.view-title{ font-family:var(--font-display); font-size:1.35rem; font-weight:800; color:var(--wine); }
.view-sub{ font-size:.85rem; color:var(--ink-soft); font-weight:700; }

/* ===================== TABLES VIEW ===================== */
.tables-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
.table-card{
  border-radius:16px; padding:16px; cursor:pointer; min-height:104px;
  display:flex; flex-direction:column; justify-content:space-between; gap:8px;
  box-shadow:0 3px 10px var(--shadow); transition:transform .12s ease;
  border:1px solid rgba(205,164,52,.3); text-align:left;
}
.table-card:active{ transform:scale(.96); }
.table-card.empty{ background:var(--cream-soft); color:var(--ink-soft); }
.table-card.occupied{ background:linear-gradient(160deg, var(--wine) 0%, var(--wine-deep) 100%); color:var(--cream); border-color:var(--gold); }
.table-card .tnum{ font-family:var(--font-display); font-size:1.25rem; font-weight:800; }
.table-card.empty .tnum{ color:var(--wine); }
.table-card .tstatus{ font-size:.76rem; font-weight:800; letter-spacing:.03em; text-transform:uppercase; }
.table-card .topened{ font-size:.7rem; opacity:.85; margin-top:1px; }

.table-items{
  display:flex; flex-direction:column; gap:4px;
  border-top:1px dashed rgba(248,239,220,.35);
  padding-top:8px; margin-top:2px;
}
.table-card.empty .table-items{ border-top-color:rgba(126,35,48,.18); }
.table-item-row{ display:flex; justify-content:space-between; gap:8px; font-size:.72rem; font-weight:700; line-height:1.35; }
.table-item-price{ white-space:nowrap; opacity:.9; }

.table-total-box{
  display:flex; justify-content:space-between; align-items:baseline; gap:8px;
  background:rgba(248,239,220,.14);
  border:1px solid rgba(205,164,52,.5);
  border-radius:10px; padding:7px 10px; margin-top:auto;
}
.table-total-box span:first-child{ font-size:.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--gold-soft); }
.table-total{ font-family:var(--font-display); font-size:1rem; font-weight:800; color:var(--cream); }

/* ===================== ORDER VIEW ===================== */
#view-order.active{ display:flex; flex-direction:column; padding:0; }
.order-header{
  display:flex; align-items:center; gap:14px; padding:12px 16px;
  background:var(--cream-soft); border-bottom:1px solid rgba(205,164,52,.3);
  flex-shrink:0;
}
.back-btn{
  display:flex; align-items:center; gap:6px; background:var(--wine); color:var(--cream);
  border:none; border-radius:20px; padding:9px 16px; font-weight:800; font-size:.88rem;
  cursor:pointer; flex-shrink:0; transition:background .15s, transform .12s;
}
.back-btn:active{ background:var(--wine-deep); transform:scale(.96); }
.order-header h2{ font-family:var(--font-display); font-size:1.15rem; font-weight:800; color:var(--wine); flex:1; }
.order-meta{ font-size:.78rem; font-weight:700; color:var(--ink-soft); white-space:nowrap; }

.order-body{ flex:1; display:flex; overflow:hidden; min-height:0; }
.menu-pane{ flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

.cat-tabs{
  display:flex; gap:8px; overflow-x:auto; padding:10px 14px;
  background:var(--cream-soft); border-bottom:1px solid rgba(205,164,52,.25);
  -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-shrink:0;
}
.cat-tabs::-webkit-scrollbar{ display:none; }
.cat-tab{
  flex-shrink:0; padding:10px 16px; border-radius:20px; border:1px solid rgba(205,164,52,.4);
  background:var(--cream); color:var(--ink-soft); font-size:.88rem; font-weight:800;
  white-space:nowrap; cursor:pointer; transition:background .15s, color .15s, transform .15s;
}
.cat-tab:active{ transform:scale(.95); }
.cat-tab.active{ background:var(--wine); color:var(--cream); border-color:var(--wine); }

.item-grid{
  flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;
  align-content:start;
  padding-bottom:calc(14px + env(safe-area-inset-bottom));
}
.menu-item-card{
  background:var(--cream-soft); border:1px solid rgba(205,164,52,.3); border-radius:14px;
  padding:14px; min-height:84px; display:flex; flex-direction:column; justify-content:space-between;
  gap:8px; cursor:pointer; text-align:left;
  transition:transform .12s ease, background .12s ease, box-shadow .18s ease;
  box-shadow:0 2px 8px var(--shadow);
}
.menu-item-card:active{ transform:scale(.95); background:var(--gold-soft); }
.menu-item-card.just-added{ animation:justAdded .32s ease; }
@keyframes justAdded{
  0%{ box-shadow:0 2px 8px var(--shadow); }
  35%{ box-shadow:0 0 0 3px var(--basil), 0 4px 14px var(--shadow); }
  100%{ box-shadow:0 2px 8px var(--shadow); }
}
.menu-item-card .iname{ font-weight:800; font-size:.92rem; line-height:1.3; color:var(--ink); }
.menu-item-card .iprice{ font-family:var(--font-display); font-weight:800; color:var(--wine); font-size:.95rem; }
.menu-item-card .ihint{ font-size:.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:var(--gold); }

/* ===================== ORDER PANE (ledger) ===================== */
.order-pane{
  width:340px; flex-shrink:0; display:flex; flex-direction:column;
  background:var(--cream-soft); border-left:1px solid rgba(205,164,52,.3);
}
.order-pane h3{ padding:14px 16px 8px; font-family:var(--font-display); font-size:1.02rem; color:var(--wine); flex-shrink:0; }

.ledger-row{ display:grid; grid-template-columns:1fr 108px 74px; align-items:center; gap:8px; }
.ledger-col-center{ text-align:center; }
.ledger-col-right{ text-align:right; }
.order-table-head{
  padding:6px 16px; margin:0 16px 6px;
  background:var(--gold-soft); border-radius:8px;
  color:var(--wine-deep); font-size:.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
  flex-shrink:0;
}

.order-list{ flex:1; overflow-y:auto; padding:0 16px; -webkit-overflow-scrolling:touch; }
.order-row{
  background:var(--cream); border:1px solid rgba(205,164,52,.25); border-radius:12px;
  padding:9px 10px; margin-bottom:8px; position:relative;
  animation:lineIn .16s ease;
}
@keyframes lineIn{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:none; } }
.order-row .oinfo{ position:relative; padding-right:16px; }
.order-row .oname{ font-weight:800; font-size:.86rem; line-height:1.3; color:var(--ink); }
.order-row .osub{ font-size:.72rem; font-weight:700; color:var(--ink-soft); margin-top:2px; line-height:1.35; }
.order-row .oremove{
  position:absolute; top:0; right:0; border:none; background:none;
  color:var(--ink-faint); font-size:13px; cursor:pointer; padding:2px 4px; line-height:1;
}
.order-row .oremove:hover{ color:var(--danger); }
.order-row .obottom{ display:flex; align-items:center; justify-content:space-between; margin-top:6px; }

.qty-controls{ display:flex; align-items:center; gap:6px; }
.qty-btn{
  width:26px; height:26px; border-radius:50%; border:1.5px solid var(--gold); background:var(--cream-soft);
  font-size:1.05rem; font-weight:800; color:var(--wine); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background .12s, transform .12s; line-height:1;
}
.qty-btn:active{ background:var(--gold-soft); transform:scale(.9); }
.qty-val{ min-width:18px; text-align:center; font-weight:800; font-size:.88rem; }
.line-total{ font-weight:800; font-family:var(--font-display); font-size:.88rem; color:var(--ink); }

.empty-order{ text-align:center; color:var(--ink-soft); padding:40px 16px; font-size:.88rem; line-height:1.6; }

.order-summary{ border-top:2px solid var(--gold); padding:14px 16px; padding-bottom:calc(14px + env(safe-area-inset-bottom)); background:var(--cream); flex-shrink:0; }
.summary-row{ display:flex; justify-content:space-between; align-items:baseline; font-size:.9rem; font-weight:700; }
.summary-row.total{ font-size:1.3rem; font-weight:800; font-family:var(--font-display); color:var(--wine); }
.summary-row.total span:last-child.bump{ animation:bump .28s ease; }
@keyframes bump{ 0%{transform:scale(1);} 30%{transform:scale(1.14);} 100%{transform:scale(1);} }
.order-actions{ margin-top:12px; }
.btn{ width:100%; padding:14px 8px; border-radius:12px; border:none; font-weight:800; font-size:.92rem; cursor:pointer; transition:transform .12s, background .12s, opacity .12s; }
.btn:active{ transform:scale(.97); }
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
.btn-primary{ background:var(--wine); color:var(--cream); }
.btn-primary:active:not(:disabled){ background:var(--wine-deep); }
.btn-secondary{ background:var(--cream); border:1px solid rgba(205,164,52,.5); color:var(--ink); }
.btn-secondary:active:not(:disabled){ background:var(--gold-soft); }
.btn-danger{ background:var(--danger); color:var(--cream); }

@media (max-width:900px){
  .order-body{ flex-direction:column; }
  .order-pane{ width:100%; max-height:44vh; border-left:none; border-top:1px solid rgba(205,164,52,.3); }
}

/* ===================== MODAL (option wizard / checkout confirm) ===================== */
.modal-root{ position:fixed; inset:0; z-index:50; display:flex; align-items:flex-end; justify-content:center; }
.modal-backdrop{ position:absolute; inset:0; background:rgba(47,32,24,.55); }
.modal{
  position:relative; background:var(--cream-soft);
  width:100%; max-width:460px;
  border-radius:22px 22px 0 0;
  border-top:3px solid var(--gold);
  padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  max-height:86vh; overflow-y:auto;
  animation:slideUp .22s ease;
}
@keyframes slideUp{ from{ transform:translateY(24px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
.modal h3{ font-size:1.15rem; color:var(--wine); }
.modal-sub{ margin:6px 0 16px; font-size:.85rem; color:var(--ink-soft); font-weight:700; }
.modal-note{ font-size:.82rem; color:var(--ink-soft); margin:-8px 0 16px; }

.picker-section{ margin-bottom:6px; }
.picker-section .modal-sub{ margin:0 0 10px; }

.chip-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
.chip{
  position:relative; border-radius:14px; padding:12px 11px;
  display:flex; align-items:center; gap:8px;
  cursor:pointer; font-weight:800; font-size:.82rem;
  border:1.5px solid rgba(205,164,52,.4);
  background:var(--cream);
  color:var(--ink);
  transition:border-color .15s ease, box-shadow .15s ease, transform .08s ease, background .15s ease;
}
.chip:active{ transform:scale(.95); }
.chip.selected{ animation:chipPop .16s ease; border-color:var(--wine); box-shadow:0 0 0 1.5px var(--wine) inset; background:var(--gold-soft); }
@keyframes chipPop{ 0%{transform:scale(1);} 50%{transform:scale(1.06);} 100%{transform:scale(1);} }
.chip-color{ background:color-mix(in srgb, var(--chip-color) 16%, var(--cream)); border-color:var(--chip-border); }
.chip-color.selected{ background:color-mix(in srgb, var(--chip-color) 28%, var(--cream)); border-color:var(--wine); box-shadow:0 0 0 1.5px var(--wine) inset; }
.chip-swatch{ width:18px; height:18px; border-radius:50%; background:var(--chip-color); border:2px solid var(--chip-border); flex:none; }
.chip-color.selected .chip-swatch{ border-color:var(--wine); }
.chip-icon{ font-size:1.25rem; line-height:1; }
.chip-check{ margin-left:auto; opacity:0; font-size:13px; color:var(--wine); font-weight:800; }
.chip.selected .chip-check{ opacity:1; }
.chip-grid-2{ grid-template-columns:repeat(2,1fr); }
.chip-container{ justify-content:center; padding:18px 10px; font-size:.98rem; }
.chip-container.selected{ background:var(--wine); color:var(--cream); border-color:var(--wine); }

.modal-actions{ display:flex; gap:10px; }
.modal-actions .btn{ width:auto; flex:1; }

/* ===================== TOAST ===================== */
.toast{
  position:fixed; left:50%; bottom:24px; z-index:60;
  transform:translateX(-50%) translateY(16px);
  background:var(--basil); color:var(--cream);
  padding:12px 22px; border-radius:999px;
  font-weight:800; font-size:.85rem;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  border:1px solid var(--gold-soft);
  opacity:0; pointer-events:none;
  max-width:88vw; text-align:center;
  transition:opacity .22s ease, transform .22s ease;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}

[hidden]{ display:none !important; }
</style>
</head>
<body>

<div id="app">

  <header class="topbar">
    <div class="brand">Rewan Ice Cream <span class="pos-label">Cashier</span></div>
    <div class="clock">
      <div class="ctime" id="clockTime"></div>
      <div class="cdate" id="clockDate"></div>
    </div>
  </header>

  <div class="content">

    <!-- ===================== TABLES ===================== -->
    <section id="view-tables" class="view active">
      <div class="view-header">
        <div class="view-title">Tables</div>
        <div class="view-sub" id="occupiedCount"></div>
      </div>
      <div class="tables-grid" id="tableGrid"></div>
    </section>

    <!-- ===================== ORDER ===================== -->
    <section id="view-order" class="view">
      <div class="order-header">
        <button class="back-btn" onclick="goBackToTables()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Tables
        </button>
        <h2 id="orderTableTitle">Table</h2>
        <div class="order-meta" id="orderTableSub"></div>
      </div>
      <div class="order-body">
        <div class="menu-pane">
          <nav class="cat-tabs" id="catTabs"></nav>
          <div class="item-grid" id="itemGrid"></div>
        </div>
        <aside class="order-pane">
          <h3>Order</h3>
          <div class="order-table-head ledger-row">
            <span>Item</span>
            <span class="ledger-col-center">Qty</span>
            <span class="ledger-col-right">Price</span>
          </div>
          <div class="order-list" id="cartLines"></div>
          <div class="order-summary">
            <div class="summary-row total"><span>Total</span><span id="cartTotal">0 IQD</span></div>
            <div class="order-actions">
              <button class="btn btn-primary" id="checkoutBtn" onclick="openCheckoutModal()">Checkout</button>
            </div>
          </div>
        </aside>
      </div>
    </section>

  </div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-root" id="modalRoot" hidden></div>

<script>
  /* ---------------- Data ---------------- */
  const COLOR_OPTIONS = [
    { name:'سپی', hex:'#FFFDF7', border:'#D8D0BF', text:'#2B2420' },
    { name:'سەوز', hex:'#8FAE6B', border:'#6B8A4C', text:'#FFFFFF' },
    { name:'قاوەیی', hex:'#6E4428', border:'#4E2E18', text:'#FFFFFF' },
    { name:'پەمەیی',  hex:'#E29CB8', border:'#C97A9C', text:'#2B2420' },
    { name:'مشکل', hex:'#D9C29C', border:'#B89968', text:'#2B2420' },
  ];
  const CONTAINER_OPTIONS = [
    { name:'کێک', icon:'🍦' },
    { name:'قاپ', icon:'🥣' },
  ];
  const TOPPING_FLAVORS = ['فستق','ڤانیلا','کاکاو','ئۆریۆ','باونتی','نۆتێلا','لۆتس','فراولە','لیمۆ','پرتەقاڵ','قەیسی','بلوبەری','مشکل'];
  const SLUSHIE_FLAVORS = ['هەنار','بلوبەری','پرتەقاڵ','ڕاسپبێری','تەمر هیندی','لیمۆ','فراولە','مشکل'];

  const MENU = [
    { id:'ics1500',    name:'ئایسکرێم سۆفت',              price:1500, category:'icecream', type:'color', needsContainer:true },
    { id:'ics1000',    name:'ئایسکرێم سۆفت',              price:1000, category:'icecream', type:'color', needsContainer:true },
    { id:'icspist',    name:'ئایسکرێم سۆفت بە فستق', price:2000, category:'icecream', type:'color', needsContainer:true },
    { id:'topping',    name:'تۆپینگی ئایسکرێم',           price:2000, category:'icecream', type:'flavor', options: TOPPING_FLAVORS, needsContainer:true },
    { id:'cocktail',   name:'کۆکتێل (ئایسکرێم + ئەزبەری)', price:3000, category:'icecream', type:'combo', options: SLUSHIE_FLAVORS },

    { id:'slushie',    name:'ئەزبەری',                     price:2000, category:'drinks', type:'flavor', options: SLUSHIE_FLAVORS },
    { id:'orangejuice',   name:'شەربەت پرتەقاڵی طبیعی',           price:3000, category:'drinks', type:'simple' },
    { id:'lemonorange',   name:'شەربەت لیمۆ و پرتەقاڵی طبیعی',   price:3000, category:'drinks', type:'simple' },
    { id:'pomjuice',      name:'شەربەت هەناری طبیعی',      price:5000, category:'drinks', type:'simple' },
    { id:'lemonjuice',    name:'شەربەت لیمۆی طبیعی',            price:4000, category:'drinks', type:'simple' },
    { id:'bananamilk',    name:'شەربەتی مۆز و شیر',          price:2000, category:'drinks', type:'simple' },
    { id:'melonjuice',    name:'شەربەت گندۆرە',                  price:2000, category:'drinks', type:'simple' },
    { id:'water',         name:'ئاو',                            price:250,  category:'water', type:'simple' },

    { id:'nutellashake', name:'شەیکی نۆتێلا', price:3000, category:'more', type:'simple' },
    { id:'oreoshake',    name:'شەیکی ئۆریۆ',     price:4000, category:'more', type:'simple' },
    { id:'crepe',         name:'کرێپ',          price:4000, category:'more', type:'simple' },
  ];

  const CATEGORIES = [
    { id:'icecream', name:'ئایسکرێم' },
    { id:'drinks',   name:'ئەزبەری و شەربەت میوە' },
    { id:'more',     name:'شەیک و زیاتر' },
    { id:'water',    name:'ئاو' },
  ];

  /* ---------------- State ---------------- */
  const STORAGE_KEY = 'rewanIceCreamPOS_v1';
  let state = null;
  let currentTableId = null;
  let currentCat = CATEGORIES[0].id;
  let lastRenderedTotal = null;

  // Picker state for item selection — container + color/flavor all shown on ONE screen at once
  let picker = { item:null, container:null, colors:new Set(), flavors:new Set() };

  function freshState(){
    return { tables: [1,2,3,4,5].map(id => ({ id, opened:null, cart:[] })) };
  }
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.tables) && parsed.tables.length === 5){
          state = parsed;
          return;
        }
      }
    }catch(e){}
    state = freshState();
  }
  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      // Storage can be blocked (e.g. opening this file directly on mobile).
      // The app should keep working in-memory even if it can't persist.
    }
  }
  function getTable(id){ return state.tables.find(t => t.id === id); }
  function uid(){ return 'l' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  /* ---------------- Helpers ---------------- */
  function fmt(n){ return n.toLocaleString('en-US') + ' IQD'; }
  function tableTotal(table){ return table.cart.reduce((sum,l) => sum + l.unitPrice * l.qty, 0); }
  function tableItemCount(table){ return table.cart.reduce((sum,l) => sum + l.qty, 0); }
  function menuItem(id){ return MENU.find(m => m.id === id); }

  function timeLabel(ms){
    return new Date(ms).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }
  function agoLabel(ms){
    const mins = Math.floor((Date.now() - ms) / 60000);
    if(mins < 1) return 'just now';
    if(mins === 1) return '1 min ago';
    if(mins < 60) return mins + ' min ago';
    const hrs = Math.floor(mins/60);
    return hrs + 'h ' + (mins%60) + 'm ago';
  }

  /* ---------------- Clock ---------------- */
  function tickClock(){
    const now = new Date();
    document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }
  tickClock();
  setInterval(tickClock, 15000);
  setInterval(() => { if(!currentTableId) renderTables(); else renderOrderHeader(); }, 30000);

  /* ---------------- Tables view ---------------- */
  function renderTables(){
    const grid = document.getElementById('tableGrid');
    let occupied = 0;
    grid.innerHTML = state.tables.map(t => {
      const active = !!t.opened;
      if(!active){
        return `
          <button class="table-card empty" onclick="openTable(${t.id})">
            <span class="tnum">Table ${t.id}</span>
            <span class="tstatus">Free</span>
          </button>`;
      }
      occupied++;
      const total = tableTotal(t);
      const count = tableItemCount(t);
      const itemRows = t.cart.map(l => `
          <div class="table-item-row">
            <span>${l.qty}× ${compactLineLabel(l)}</span>
            <span class="table-item-price">${fmt(l.unitPrice * l.qty)}</span>
          </div>`).join('');
      return `
        <button class="table-card occupied" onclick="openTable(${t.id})">
          <span class="tnum">Table ${t.id}</span>
          <span class="tstatus">Opened ${timeLabel(t.opened)}</span>
          <span class="topened">${agoLabel(t.opened)}</span>
          <div class="table-items">${itemRows}</div>
          <div class="table-total-box">
            <span>Total · ${count} item${count===1?'':'s'}</span>
            <span class="table-total">${fmt(total)}</span>
          </div>
        </button>`;
    }).join('');
    document.getElementById('occupiedCount').textContent = occupied + ' of ' + state.tables.length + ' tables occupied';
  }

  /* ---------------- Order view ---------------- */
  function goToView(view){
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
  }

  function openTable(id){
    currentTableId = id;
    currentCat = CATEGORIES[0].id;
    lastRenderedTotal = null;
    renderOrderHeader();
    renderCatTabs();
    renderItemGrid();
    renderCart();
    goToView('order');
  }
  function goBackToTables(){
    currentTableId = null;
    renderTables();
    goToView('tables');
  }

  function renderOrderHeader(){
    const t = getTable(currentTableId);
    document.getElementById('orderTableTitle').textContent = 'Table ' + t.id;
    document.getElementById('orderTableSub').textContent = t.opened
      ? `Opened ${timeLabel(t.opened)} · ${agoLabel(t.opened)}`
      : 'New order';
  }

  function itemHint(item){
    if(item.type === 'simple') return '';
    const parts = [];
    if(item.needsContainer) parts.push('cone or bowl');
    if(item.type === 'color') parts.push('color(s)');
    if(item.type === 'flavor') parts.push('flavor(s)');
    if(item.type === 'combo') parts.push('ice cream color & slushie flavor');
    return 'Tap to choose ' + parts.join(' + ');
  }

  function renderCatTabs(){
    document.getElementById('catTabs').innerHTML = CATEGORIES.map(cat =>
      `<button class="cat-tab ${cat.id===currentCat?'active':''}" onclick="selectCategory('${cat.id}')" dir="rtl">${cat.name}</button>`
    ).join('');
  }
  function selectCategory(catId){
    currentCat = catId;
    renderCatTabs();
    renderItemGrid();
  }

  function renderItemGrid(){
    const items = MENU.filter(m => m.category === currentCat);
    document.getElementById('itemGrid').innerHTML = items.map(item => {
      const hasOptions = item.type !== 'simple';
      return `
        <button class="menu-item-card" onclick="handleItemTap('${item.id}', event)">
          <span class="iname" dir="rtl">${item.name}</span>
          <span class="iprice">${fmt(item.price)}</span>
          ${hasOptions ? `<span class="ihint">${itemHint(item)}</span>` : ''}
        </button>`;
    }).join('');
  }

  function flashButton(el){
    if(!el) return;
    el.classList.remove('just-added');
    void el.offsetWidth; // restart animation
    el.classList.add('just-added');
    el.addEventListener('animationend', () => el.classList.remove('just-added'), { once:true });
  }

  function handleItemTap(itemId, evt){
    const item = menuItem(itemId);
    if(item.type === 'simple'){
      addOrderLine({ item });
      if(evt && evt.currentTarget) flashButton(evt.currentTarget);
    } else {
      openOptionModal(item);
    }
  }

  function sameSelections(a, b){
    if(a.length !== b.length) return false;
    const as = [...a].sort(), bs = [...b].sort();
    return as.every((v,i) => v === bs[i]);
  }

  function lineMatches(line, itemId, container, selections, combo){
    if(line.itemId !== itemId) return false;
    if((line.container || null) !== (container || null)) return false;
    if(combo){
      if(!line.combo) return false;
      return sameSelections(line.combo.colors, combo.colors) && sameSelections(line.combo.flavors, combo.flavors);
    }
    if(line.combo) return false;
    const la = line.selections || [];
    const lb = selections || [];
    if(la.length === 0 && lb.length === 0) return true;
    return sameSelections(la, lb);
  }

  let toastTimer = null;
  function showToast(message){
    const el = document.getElementById('toast');
    el.textContent = message;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
  }

  // Adds an order line. Choosing multiple colors/flavors mixes them into ONE item
  // (not one item per selection). Re-adding the exact same combo just bumps quantity.
  function addOrderLine({ item, container = null, selections = null, combo = null }){
    const t = getTable(currentTableId);
    if(!t.opened) t.opened = Date.now();
    let line = t.cart.find(l => lineMatches(l, item.id, container, selections, combo));
    if(line){
      line.qty += 1;
    } else {
      t.cart.push({
        key: uid(),
        itemId: item.id,
        name: item.name,
        unitPrice: item.price,
        qty: 1,
        container: container || null,
        selections: selections ? selections.slice() : null,
        combo: combo ? { colors: combo.colors.slice(), flavors: combo.flavors.slice() } : null,
      });
    }
    saveState();
    renderOrderHeader();
    renderCart();
    showToast('Added ' + item.name + ' · ' + fmt(tableTotal(t)) + ' total');
  }

  function changeQty(lineKey, delta){
    const t = getTable(currentTableId);
    const line = t.cart.find(l => l.key === lineKey);
    if(!line) return;
    line.qty += delta;
    if(line.qty <= 0){
      t.cart = t.cart.filter(l => l.key !== lineKey);
    }
    if(t.cart.length === 0) t.opened = null;
    saveState();
    renderOrderHeader();
    renderCart();
  }

  function removeLine(lineKey){
    const t = getTable(currentTableId);
    t.cart = t.cart.filter(l => l.key !== lineKey);
    if(t.cart.length === 0) t.opened = null;
    saveState();
    renderOrderHeader();
    renderCart();
  }

  // Mixed colors/flavors text only (no container) — shared by cart and table-card views.
  function selectionsText(l){
    const parts = [];
    if(l.combo){
      parts.push('Ice cream: ' + l.combo.colors.join(', '));
      parts.push('Slushie: ' + l.combo.flavors.join(', '));
    } else if(l.selections && l.selections.length){
      parts.push(l.selections.length > 1 ? 'Mixed: ' + l.selections.join(', ') : l.selections.join(', '));
    }
    return parts.join(' · ');
  }

  // Full description for an order ledger row: container + mixed selections.
  function lineSubtext(l){
    const parts = [];
    if(l.container) parts.push(l.container);
    const sel = selectionsText(l);
    if(sel) parts.push(sel);
    return parts.join(' · ');
  }

  // Compact single-line label used on the table-grid cards.
  function compactLineLabel(l){
    let label = l.name;
    if(l.container) label += ' (' + l.container + ')';
    const sel = selectionsText(l);
    if(sel) label += ' – ' + sel;
    return label;
  }

  function renderCart(){
    const t = getTable(currentTableId);
    const linesEl = document.getElementById('cartLines');
    if(t.cart.length === 0){
      linesEl.innerHTML = `<div class="empty-order">No items yet.<br>Tap a menu item to add it to this table.</div>`;
    } else {
      linesEl.innerHTML = t.cart.map(l => {
        const lineTotal = l.unitPrice * l.qty;
        const sub = lineSubtext(l);
        return `
          <div class="order-row">
            <div class="oinfo">
              <span class="oname" dir="rtl">${l.name}</span>
              <button class="oremove" onclick="removeLine('${l.key}')" aria-label="Remove">✕</button>
              ${sub ? `<div class="osub">${sub}</div>` : ''}
            </div>
            <div class="obottom">
              <div class="qty-controls">
                <button class="qty-btn" onclick="changeQty('${l.key}',-1)" aria-label="Decrease quantity">−</button>
                <span class="qty-val">${l.qty}</span>
                <button class="qty-btn" onclick="changeQty('${l.key}',1)" aria-label="Increase quantity">+</button>
              </div>
              <span class="line-total">${fmt(lineTotal)}</span>
            </div>
          </div>`;
      }).join('');
    }
    const total = tableTotal(t);
    const count = tableItemCount(t);
    const totalEl = document.getElementById('cartTotal');
    if(lastRenderedTotal !== null && lastRenderedTotal !== total){
      totalEl.classList.remove('bump');
      void totalEl.offsetWidth;
      totalEl.classList.add('bump');
    }
    lastRenderedTotal = total;
    totalEl.textContent = fmt(total);
    document.getElementById('checkoutBtn').disabled = count === 0;
  }

  /* ---------------- Option picker (container + color/flavor shown together, one screen) ---------------- */
  function openOptionModal(item){
    picker = { item, container: null, colors: new Set(), flavors: new Set() };
    renderOptionModal();
    document.getElementById('modalRoot').hidden = false;
  }
  function cancelPicker(){
    picker = { item:null, container:null, colors:new Set(), flavors:new Set() };
    document.getElementById('modalRoot').hidden = true;
    document.getElementById('modalRoot').innerHTML = '';
  }
  function pickerIsValid(item){
    if(item.needsContainer && !picker.container) return false;
    if((item.type === 'color' || item.type === 'combo') && picker.colors.size === 0) return false;
    if((item.type === 'flavor' || item.type === 'combo') && picker.flavors.size === 0) return false;
    return true;
  }
  function selectContainer(name){
    picker.container = name;
    renderOptionModal();
  }
  function toggleColor(name){
    if(picker.colors.has(name)) picker.colors.delete(name);
    else picker.colors.add(name);
    renderOptionModal();
  }
  function toggleFlavor(name){
    if(picker.flavors.has(name)) picker.flavors.delete(name);
    else picker.flavors.add(name);
    renderOptionModal();
  }
  function confirmPicker(){
    const item = picker.item;
    if(!pickerIsValid(item)) return;
    const container = picker.container;
    if(item.type === 'color'){
      addOrderLine({ item, container, selections: Array.from(picker.colors) });
    } else if(item.type === 'flavor'){
      addOrderLine({ item, container, selections: Array.from(picker.flavors) });
    } else if(item.type === 'combo'){
      addOrderLine({ item, container, combo: { colors: Array.from(picker.colors), flavors: Array.from(picker.flavors) } });
    }
    cancelPicker();
  }

  function renderOptionModal(){
    const item = picker.item;
    const sections = [];

    if(item.needsContainer){
      sections.push(`
        <div class="picker-section">
          <p class="modal-sub">Cone or Bowl?</p>
          <div class="chip-grid chip-grid-2">${CONTAINER_OPTIONS.map(opt => `
            <button type="button" class="chip chip-container ${picker.container===opt.name?'selected':''}" onclick="selectContainer('${opt.name}')">
              <span class="chip-icon">${opt.icon}</span>
              <span class="chip-label" dir="rtl">${opt.name}</span>
              <span class="chip-check">✓</span>
            </button>`).join('')}</div>
        </div>`);
    }

    if(item.type === 'color' || item.type === 'combo'){
      const title = item.type === 'combo' ? 'Choose the ice cream color(s)' : 'Choose color(s) to mix';
      sections.push(`
        <div class="picker-section">
          <p class="modal-sub">${title}</p>
          <div class="chip-grid">${COLOR_OPTIONS.map(opt => {
            const selected = picker.colors.has(opt.name);
            return `<button type="button" class="chip chip-color ${selected?'selected':''}"
              style="--chip-color:${opt.hex}; --chip-border:${opt.border}; --chip-text:${opt.text}"
              onclick="toggleColor('${opt.name}')">
              <span class="chip-swatch"></span>
              <span class="chip-label" dir="rtl">${opt.name}</span>
              <span class="chip-check">✓</span>
            </button>`;
          }).join('')}</div>
        </div>`);
    }

    if(item.type === 'flavor' || item.type === 'combo'){
      const title = item.type === 'combo' ? 'Choose the slushie flavor(s)' : 'Choose flavor(s) to mix';
      sections.push(`
        <div class="picker-section">
          <p class="modal-sub">${title}</p>
          <div class="chip-grid">${item.options.map(name => {
            const selected = picker.flavors.has(name);
            return `<button type="button" class="chip chip-flavor ${selected?'selected':''}" onclick="toggleFlavor('${name}')">
              <span class="chip-label" dir="rtl">${name}</span>
              <span class="chip-check">✓</span>
            </button>`;
          }).join('')}</div>
        </div>`);
    }

    const valid = pickerIsValid(item);

    document.getElementById('modalRoot').innerHTML = `
      <div class="modal-backdrop" onclick="cancelPicker()"></div>
      <div class="modal" role="dialog" aria-modal="true" aria-label="${item.name}">
        <h3 dir="rtl">${item.name}</h3>
        <p class="modal-sub">${fmt(item.price)}</p>
        ${sections.join('')}
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="cancelPicker()">Cancel</button>
          <button class="btn btn-primary" onclick="confirmPicker()" ${valid?'':'disabled'}>Add to Order</button>
        </div>
      </div>`;
  }

  /* ---------------- Checkout modal ---------------- */
  function openCheckoutModal(){
    const t = getTable(currentTableId);
    if(tableItemCount(t) === 0) return;
    const total = tableTotal(t);
    document.getElementById('modalRoot').innerHTML = `
      <div class="modal-backdrop" onclick="closeGenericModal()"></div>
      <div class="modal" role="dialog" aria-modal="true" aria-label="Confirm checkout">
        <h3>Checkout Table ${t.id}?</h3>
        <p class="modal-sub">Total: <strong>${fmt(total)}</strong></p>
        <p class="modal-note">This will clear the table. Are you sure?</p>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeGenericModal()">Cancel</button>
          <button class="btn btn-danger" onclick="confirmCheckout()">Yes, checkout</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').hidden = false;
  }
  function closeGenericModal(){
    document.getElementById('modalRoot').hidden = true;
    document.getElementById('modalRoot').innerHTML = '';
  }
  function confirmCheckout(){
    const t = getTable(currentTableId);
    t.cart = [];
    t.opened = null;
    saveState();
    closeGenericModal();
    goBackToTables();
  }

  /* ---------------- Init ---------------- */
  try{
    loadState();
    renderTables();
  }catch(err){
    document.getElementById('tableGrid').innerHTML =
      '<p style="color:#fff;font-weight:700;padding:20px;">' +
      'Something went wrong loading the app. Try closing and reopening this file, ' +
      'or reopening it in a different browser (Chrome or Safari).' +
      '</p>';
    console.error('Rewan POS failed to start:', err);
  }
</script>
</body>
</html>
